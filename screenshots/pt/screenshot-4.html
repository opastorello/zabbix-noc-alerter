<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8">
<style>
  html,body{margin:0;padding:0;} *{box-sizing:border-box;}
  body{width:1280px;height:800px;overflow:hidden;font-family:'Segoe UI',-apple-system,sans-serif;
       background:radial-gradient(1100px 640px at 50% 16%, #18241b 0%, #14171e 44%, #0b0d12 100%);}
  .slide{width:1280px;height:800px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 80px;}
  .eyebrow{display:flex;align-items:center;gap:11px;font-size:14px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#5fc08a;margin-bottom:24px;}
  .eyebrow img{width:30px;height:30px;border-radius:7px;}
  h1{font-size:58px;line-height:1.05;font-weight:800;margin:0 0 22px;color:#fff;letter-spacing:-1.5px;}
  .sub{font-size:22px;color:#aab2c0;margin:0 0 46px;max-width:780px;line-height:1.5;}
  .grid{display:flex;gap:18px;margin-bottom:44px;}
  .pill{display:flex;align-items:center;gap:11px;background:#161a20;border:1px solid #2a2f3a;border-radius:12px;padding:18px 24px;font-size:17px;color:#dfe4ec;font-weight:600;}
  .pill .ck{color:#5fc08a;font-size:20px;font-weight:800;}
  .langs{display:flex;gap:12px;}
  .lang{font-size:16px;font-weight:600;color:#cfd6e0;background:#161a20;border:1px solid #2a2f3a;border-radius:22px;padding:9px 20px;}
  .by{margin-top:40px;font-size:15px;color:#7a8290;} .by b{color:#5fc08a;}
</style></head>
<body>
<div class="slide">
  <div class="eyebrow"><img src="../../icons/icon48.png" alt="">Zabbix NOC Alerter</div>
  <h1>Privada por padrão</h1>
  <p class="sub">Fala só com o seu Zabbix e lê o cookie de sessão localmente. Sem analytics, sem telemetria, sem URL ou token embutidos no código.</p>
  <div class="grid">
    <div class="pill"><span class="ck">&#x2713;</span>Fala só com o seu Zabbix</div>
    <div class="pill"><span class="ck">&#x2713;</span>Sessão aberta, token opcional</div>
    <div class="pill"><span class="ck">&#x2713;</span>Nada fixo no código</div>
  </div>
  <div class="langs"><span class="lang">English</span><span class="lang">Português</span><span class="lang">Español</span></div>
  <div class="by">by <b>@opastorello</b></div>
</div>
</body></html>
