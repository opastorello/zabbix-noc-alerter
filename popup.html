<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Zabbix NOC Alerter</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-main">
        <img class="brand-icon" src="icons/icon16.png" alt="">
        <h1>Zabbix NOC Alerter</h1>
      </div>
      <div class="header-actions">
        <button id="muteBtn" class="icon-btn" data-i18n-title="t_mute" data-i18n-aria="t_mute" title="Mudo" aria-label="Mudo"><span aria-hidden="true">&#x1f50a;</span></button>
        <button id="refreshBtn" class="icon-btn" data-i18n-title="t_check" data-i18n-aria="t_check" title="Checar agora" aria-label="Checar agora"><span aria-hidden="true">&#x21bb;</span></button>
        <button id="settingsBtn" class="icon-btn" data-i18n-title="t_settings" data-i18n-aria="t_settings" title="Configurações" aria-label="Configurações"><span aria-hidden="true">&#x2699;</span></button>
      </div>
    </header>

    <div id="statusBar" class="status-bar" role="status" aria-live="polite" aria-atomic="true" data-i18n="loading">Carregando...</div>

    <div class="stats-row">
      <div class="stat dis" data-sev="5" data-i18n-title="filter_sev" title="Filtrar por severidade"><span id="cDis">0</span>DIS</div>
      <div class="stat high" data-sev="4" data-i18n-title="filter_sev" title="Filtrar por severidade"><span id="cHigh">0</span>HIGH</div>
      <div class="stat avg" data-sev="3" data-i18n-title="filter_sev" title="Filtrar por severidade"><span id="cAvg">0</span>AVG</div>
      <div class="stat warn" data-sev="2" data-i18n-title="filter_sev" title="Filtrar por severidade"><span id="cWarn">0</span>WARN</div>
      <div class="stat info" data-sev="info" data-i18n-title="filter_sev" title="Filtrar por severidade"><span id="cInfo">0</span>INFO</div>
    </div>

    <div class="filter-row" id="filterRow" style="display:none;">
      <input type="text" id="filterBox" class="filter-box" data-i18n-ph="filter_ph" data-i18n-aria="filter_ph" placeholder="Filtrar host ou problema" autocomplete="off">
      <select id="sortBy" class="sort-sel" data-i18n-title="sort_by" title="Ordenar">
        <option value="sev" data-i18n="sort_sev">Severidade</option>
        <option value="age" data-i18n="sort_age">Idade</option>
        <option value="host" data-i18n="sort_host">Host</option>
      </select>
      <select id="groupBy" class="sort-sel" data-i18n-title="grp_by" title="Agrupar">
        <option value="none" data-i18n="grp_none">Sem grupo</option>
        <option value="host" data-i18n="grp_host">Host</option>
        <option value="instance" data-i18n="grp_inst">Instância</option>
      </select>
    </div>

    <div id="list" class="list">
      <div class="empty" data-i18n="nodata">Sem dados ainda.</div>
    </div>

    <footer>
      <div class="credit">Zabbix NOC Alerter <span id="popVer"></span> - <a href="https://github.com/opastorello/zabbix-noc-alerter" target="_blank" rel="noopener">@opastorello</a></div>
    </footer>
  </div>
  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
